    var now = new Date();
    function createtime(){
        var grt= new Date("10/1/2022 17:10:00");/*---这里是网站的启用时间--*/
        now.setTime(now.getTime()+250);
        days = (now - grt ) / 1000 / 60 / 60 / 24;
        dnum = Math.floor(days);
        hours = (now - grt ) / 1000 / 60 / 60 - (24 * dnum);
        hnum = Math.floor(hours);
        if(String(hnum).length ==1 ){hnum = "0" + hnum;}
        minutes = (now - grt ) / 1000 /60 - (24 * 60 * dnum) - (60 * hnum);
        mnum = Math.floor(minutes);
        if(String(mnum).length ==1 ){mnum = "0" + mnum;}
        seconds = (now - grt ) / 1000 - (24 * 60 * 60 * dnum) - (60 * 60 * hnum) - (60 * mnum);
        snum = Math.round(seconds);
        if(String(snum).length ==1 ){snum = "0" + snum;}
        document.getElementById("timeDate").innerHTML = "我的客栈已营业："+dnum+"天";
        document.getElementById("times").innerHTML = hnum + "小时" + mnum + "分" + snum + "秒   (*๓´╰╯`๓)";
    }
    setInterval("createtime()",250); 
</script>

<script type="text/javascript">
    $(document).click(function(e){
        var list = [
            "❤富强❤", "❤民主❤", "❤文明❤", "❤和谐❤", "❤自由❤", "❤平等❤", "❤公正❤", "❤法治❤",
            "❤爱国❤", "❤敬业❤", "❤诚信❤", "❤友善❤"
        ];
        textUp( e, 2000, list, 200 )
    })
    function textUp( e, time, arr, heightUp ){
        var lists = Math.floor(Math.random() * arr.length);
        var colors = '#'+Math.floor(Math.random()*0xffffff).toString(16);
        var $i = $('<span />').text( arr[lists] );
        var xx = e.pageX || e.clientX + document.body.scroolLeft;
        var yy = e.pageY || e.clientY + document.body.scrollTop;

        $('body').append($i);
        $i.css({
            top: yy,
            left: xx,
            color: colors,
            transform: 'translate(-50%, -50%)',
            display: 'block',
            position: 'absolute',
            zIndex: 999999999999
        })
        $i.animate({
            top: yy - ( heightUp ? heightUp : 200 ),
            opacity: 0
        }, time, function(){
            $i.remove();
        })
    }
</script>
